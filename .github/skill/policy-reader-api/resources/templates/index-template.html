<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Policy Reader API - Template Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .content {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .section {
            margin-bottom: 30px;
        }
        
        .section h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.3em;
        }
        
        textarea {
            width: 100%;
            min-height: 150px;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-family: monospace;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: scale(1.05);
        }
        
        #response {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            border: 1px solid #ddd;
            min-height: 100px;
        }
        
        .success {
            color: #28a745;
        }
        
        .error {
            color: #dc3545;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 Policy Reader API</h1>
            <p>Extrae estructura de pólizas desde texto libre</p>
        </header>
        
        <div class="content">
            <div class="section">
                <h2>Ingresa el texto de la póliza:</h2>
                <textarea id="policyText" placeholder="Aseguradora: Mapfre&#10;Numero de poliza: POL-2026-1001&#10;..."></textarea>
                <br><br>
                <button onclick="submitPolicy()">Procesar Póliza</button>
            </div>
            
            <div class="section">
                <h2>Resultado:</h2>
                <pre id="response">Esperando entrada...</pre>
            </div>
        </div>
    </div>
    
    <script>
        function submitPolicy() {
            const rawText = document.getElementById('policyText').value;
            const responseDiv = document.getElementById('response');
            
            if (!rawText.trim()) {
                responseDiv.innerHTML = '<span class="error">Error: Por favor ingresa el texto de la póliza</span>';
                return;
            }
            
            fetch('/api/v1/policies/read', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ rawText: rawText })
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    responseDiv.innerHTML = `<span class="error">Error: ${data.error}</span>`;
                } else {
                    responseDiv.innerHTML = `<span class="success">✓ Éxito</span>\n${JSON.stringify(data, null, 2)}`;
                }
            })
            .catch(error => {
                responseDiv.innerHTML = `<span class="error">Error de conexión: ${error.message}</span>`;
            });
        }
    </script>
</body>
</html>
