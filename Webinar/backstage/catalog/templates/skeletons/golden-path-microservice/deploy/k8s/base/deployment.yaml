# Recursos de Kubernetes para ${{ values.service_name }}
# Generado por el Golden Path IDP de AYESA
# Stack: ${{ values.language }} | Namespace: ${{ values.k8s_namespace }}
---
# ── Deployment ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${{ values.service_name }}
  namespace: ${{ values.k8s_namespace }}
  labels:
    app.kubernetes.io/name: ${{ values.service_name }}
    app.kubernetes.io/instance: ${{ values.service_name }}
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/component: service
    backstage.io/kubernetes-id: ${{ values.service_name }}
  annotations:
    deployment.kubernetes.io/revision: "1"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ${{ values.service_name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ${{ values.service_name }}
        app.kubernetes.io/version: "0.1.0"
{%- if values.enable_metrics %}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
{%- endif %}
    spec:
      serviceAccountName: ${{ values.service_name }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: ${{ values.service_name }}
          image: ${{ values.registry }}/${{ values.service_name }}:latest
          imagePullPolicy: Always
          ports:
{%- if values.language == "java-springboot" or values.language == "golang" %}
            - name: http
              containerPort: 8080
              protocol: TCP
{%- elif values.language == "node-express" or values.language == "node-nestjs" %}
            - name: http
              containerPort: 3000
              protocol: TCP
{%- else %}
            - name: http
              containerPort: 8000
              protocol: TCP
{%- endif %}
          env:
            - name: SERVICE_NAME
              value: "${{ values.service_name }}"
            - name: ENVIRONMENT
              value: "${{ values.k8s_namespace }}"
{%- if values.enable_tracing %}
            - name: OTEL_SERVICE_NAME
              value: "${{ values.service_name }}"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.observability.svc.cluster.local:4317"
{%- endif %}
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule

---
# ── Service ────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: ${{ values.service_name }}
  namespace: ${{ values.k8s_namespace }}
  labels:
    app.kubernetes.io/name: ${{ values.service_name }}
spec:
  selector:
    app.kubernetes.io/name: ${{ values.service_name }}
  ports:
    - name: http
      protocol: TCP
      port: 80
{%- if values.language == "java-springboot" or values.language == "golang" %}
      targetPort: 8080
{%- elif values.language == "node-express" or values.language == "node-nestjs" %}
      targetPort: 3000
{%- else %}
      targetPort: 8000
{%- endif %}

---
# ── ServiceAccount ─────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ${{ values.service_name }}
  namespace: ${{ values.k8s_namespace }}
  labels:
    app.kubernetes.io/name: ${{ values.service_name }}

{%- if values.enable_hpa %}
---
# ── HorizontalPodAutoscaler ────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ${{ values.service_name }}
  namespace: ${{ values.k8s_namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ${{ values.service_name }}
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
{%- endif %}

{%- if values.enable_metrics %}
---
# ── ServiceMonitor (Prometheus Operator) ───────────────────────────────────
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ${{ values.service_name }}
  namespace: ${{ values.k8s_namespace }}
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: ${{ values.service_name }}
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
{%- endif %}
